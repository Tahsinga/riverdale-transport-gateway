<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riverdale Academy — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red:        #c0392b;
      --red-dark:   #96281b;
      --red-glow:   rgba(192,57,43,0.25);
      --gold:       #f0a500;
      --bg:         #0f0f0f;
      --surface:    #181818;
      --surface2:   #222222;
      --border:     #2e2e2e;
      --text:       #f0f0f0;
      --muted:      #888;
      --online:     #27ae60;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── animated grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(192,57,43,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192,57,43,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* ── radial spotlight ── */
    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(192,57,43,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── card ── */
    .card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 420px;
      padding: 44px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(192,57,43,.12),
        0 24px 64px rgba(0,0,0,.6),
        0 0 80px var(--red-glow);
      animation: cardIn .55s cubic-bezier(.22,.97,.58,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── logo block ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      animation: fadeUp .5s .1s both;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 20px var(--red-glow);
      flex-shrink: 0;
    }
    .logo-text h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      line-height: 1.2;
      color: var(--text);
    }
    .logo-text span {
      font-size: .72rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── status pill ── */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      color: var(--online);
      background: rgba(39,174,96,.1);
      border: 1px solid rgba(39,174,96,.25);
      border-radius: 100px;
      padding: 4px 10px;
      margin-bottom: 28px;
      width: fit-content;
      animation: fadeUp .5s .2s both;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--online);
      box-shadow: 0 0 6px var(--online);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ── heading ── */
    .heading {
      margin-bottom: 28px;
      animation: fadeUp .5s .25s both;
    }
    .heading h2 {
      font-size: 1.55rem;
      font-weight: 700;
      line-height: 1.25;
    }
    .heading h2 span { color: var(--red); }
    .heading p {
      margin-top: 6px;
      font-size: .82rem;
      color: var(--muted);
    }

    /* ── divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
      animation: fadeUp .5s .28s both;
    }

    /* ── form ── */
    .form { animation: fadeUp .5s .32s both; }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: .74rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--muted);
      pointer-events: none;
      transition: color .2s;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      font-family: 'Sora', sans-serif;
      font-size: .88rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: #555; }
    input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow);
    }
    input:focus + .icon,
    .input-wrap:focus-within .icon { color: var(--red); }

    /* ── row: remember + forgot ── */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
      color: var(--muted);
      cursor: pointer;
    }
    .remember input[type=checkbox] {
      width: 16px;
      height: 16px;
      accent-color: var(--red);
      padding: 0;
      border-radius: 4px;
    }
    .forgot {
      font-size: .8rem;
      color: var(--red);
      text-decoration: none;
      transition: opacity .2s;
    }
    .forgot:hover { opacity: .75; }

    /* ── button ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .04em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      box-shadow: 0 4px 20px var(--red-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--red-glow);
    }
    .btn-login:active { transform: translateY(0); opacity: .9; }

    /* ── footer note ── */
    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: .74rem;
      color: var(--muted);
      animation: fadeUp .5s .4s both;
    }
    .footer-note span {
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold);
    }

    /* ── decorative corner accents ── */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 60px;
      height: 60px;
      border-color: var(--red);
      border-style: solid;
      opacity: .35;
      pointer-events: none;
    }
    .card::before {
      top: 16px;
      left: 16px;
      border-width: 2px 0 0 2px;
      border-radius: 4px 0 0 0;
    }
    .card::after {
      bottom: 16px;
      right: 16px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 4px 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── shake on error ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
    .card.shake { animation: shake .4s ease; }

    /* ── loading spinner ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="card" id="card">

    <div class="logo-wrap">
      <div class="logo-icon">🏫</div>
      <div class="logo-text">
        <h1>RIVERDALE<br>ACADEMY</h1>
        <span>RFID Payment Hub</span>
      </div>
    </div>
    <div class="divider"></div>

    {% if messages %}
      <div style="margin-bottom: 16px; padding: 10px 12px; background: rgba(192,57,43,.15); border: 1px solid rgba(192,57,43,.3); border-radius: 8px;">
        {% for message in messages %}
          <div style="color: {% if message.tags %}#27ae60{% else %}var(--red){% endif %}; font-size: 0.85rem;">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="post" class="form" id="loginForm">
      {% csrf_token %}
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required/>
          <span class="icon">👤</span>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
          <span class="icon">🔒</span>
        </div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember" name="remember"/> Remember me
        </label>
      </div>

      <button class="btn-login" id="loginBtn" type="submit">
        <span id="btnText">Sign In</span>
        <div class="spinner" id="spinner"></div>
        <span id="btnIcon">→</span>
      </button>
    </form>

    <div class="footer-note">
      Secured portal &nbsp;·&nbsp; <span>v2.4.1</span> &nbsp;·&nbsp; Sunday, May 31 2026
    </div>

  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const card = document.getElementById('card');
    const text = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    const icon = document.getElementById('btnIcon');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Validate
      if (!username || !password) {
        card.classList.remove('shake');
        void card.offsetWidth; // reflow trigger
        card.classList.add('shake');
        return;
      }

      // Show loading state
      btn.disabled = true;
      text.textContent = 'Signing in...';
      icon.style.display = 'none';
      spinner.style.display = 'block';

      // Submit form (Django will handle auth)
      setTimeout(() => {
        form.submit();
      }, 600);
    });

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const activeEl = document.activeElement;
        if (activeEl && (activeEl.id === 'username' || activeEl.id === 'password')) {
          form.dispatchEvent(new Event('submit'));
        }
      }
    });
  </script>
</body>
</html>
