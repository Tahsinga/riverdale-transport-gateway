{% extends 'config/base.html' %}

{% block content %}
  <div class="card mx-auto" style="max-width:640px">
    <div class="card-body">
      <h4 class="card-title">Top Up Account</h4>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">RFID UID</label>
          <input name="uid" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Amount</label>
          <input name="amount" class="form-control" required type="number" step="0.01">
        </div>
        <button class="btn btn-primary">Add Funds</button>
      </form>
    </div>
  </div>
{% endblock %}
